name: 'Deploy Rehearsal'
description: 'Catch deploy-time failures in PRs: env / OAuth / Prisma / Next.js drift, with baseline-aware change verdicts.'
author: 'amu-create'
branding:
  icon: 'shield'
  color: 'orange'

inputs:
  working-directory:
    description: 'Project root that holds deploy-rehearsal.config.json'
    required: false
    default: '.'
  base-ref:
    description: 'Git ref to compare against. Defaults to the PR base branch (origin/<base>).'
    required: false
    default: ''
  mode:
    description: 'Comparison mode: merge-base (default) or direct'
    required: false
    default: 'merge-base'
  fail-on-block:
    description: 'Fail the job when the absolute verdict is BLOCK'
    required: false
    default: 'true'
  comment:
    description: 'Post (or update) a single PR comment with the rehearsal result'
    required: false
    default: 'true'
  github-token:
    description: 'Token used for the PR comment. Needs `pull-requests: write`.'
    required: false
    default: ${{ github.token }}

outputs:
  verdict:
    description: 'GO | CAUTION | BLOCK (absolute)'
    value: ${{ steps.rehearse.outputs.verdict }}
  change-verdict:
    description: 'GO | CAUTION | BLOCK (vs base ref); empty when no baseline'
    value: ${{ steps.rehearse.outputs.change-verdict }}
  score:
    description: 'Numeric absolute risk score'
    value: ${{ steps.rehearse.outputs.score }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install + build engine
      shell: bash
      working-directory: ${{ github.action_path }}/..
      run: |
        npm ci --no-audit --no-fund
        npm run build

    - name: Run rehearsal
      id: rehearse
      shell: bash
      env:
        BASE_REF: ${{ inputs.base-ref }}
        DEFAULT_BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
        MODE: ${{ inputs.mode }}
        FAIL_ON_BLOCK: ${{ inputs.fail-on-block }}
        SHOULD_COMMENT: ${{ inputs.comment }}
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO_FULL: ${{ github.repository }}
        INPUT_WORKING_DIRECTORY: ${{ inputs.working-directory }}
        GITHUB_OUTPUT: ${{ env.GITHUB_OUTPUT }}
      run: node ${{ github.action_path }}/run.mjs
